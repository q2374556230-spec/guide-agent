apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      containers:
        - name: product-service
          image: service-agent-lab:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "services/product_service.py"]
          ports:
            - containerPort: 8002
          readinessProbe:
            httpGet:
              path: /products
              port: 8002
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: product-service
spec:
  selector:
    app: product-service
  ports:
    - port: 8002
      targetPort: 8002
