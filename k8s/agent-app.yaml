apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-app
  template:
    metadata:
      labels:
        app: agent-app
    spec:
      containers:
        - name: agent-app
          image: service-agent-lab:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "server.py"]
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: service-agent-config
            - secretRef:
                name: service-agent-llm-secret
                optional: true
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: agent-app
spec:
  type: NodePort
  selector:
    app: agent-app
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30080
