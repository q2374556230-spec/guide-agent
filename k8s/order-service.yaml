apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: service-agent-lab:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "services/order_service.py"]
          ports:
            - containerPort: 8001
          readinessProbe:
            httpGet:
              path: /orders/20260601001
              port: 8001
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
spec:
  selector:
    app: order-service
  ports:
    - port: 8001
      targetPort: 8001
